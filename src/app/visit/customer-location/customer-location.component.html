<div class="location-page">
  <div class="location-card">
    <div class="location-card__header">
      <button class="back-chip" type="button" (click)="goBack()">
        <img src="assets/images/icon/arrow_back.png" alt="volver">
        <span>Volver</span>
      </button>
      <div>
        <h2>Localizar cliente</h2>
        <p>Captura la posición actual del cliente y actualiza su ficha.</p>
      </div>
    </div>

    <div class="location-card__body">
      <label class="field-label">Selecciona el cliente</label>
      <div class="autocomplete-wrapper">
        <ng-autocomplete [data]="customers.customerList" [searchKeyword]="customers.keyword"
          placeholder="Nombre del cliente" (selected)='customers.setCustomerSelected($event)'
          (inputFocused)='onFocused($event)' [itemTemplate]="itemTemplate"
          [notFoundTemplate]="notFoundTemplate">
        </ng-autocomplete>
      </div>

      <ng-template #itemTemplate let-item>
        <div class="autocomplete-item">{{ item.label }}</div>
      </ng-template>

      <ng-template #notFoundTemplate let-notFound>
        <div class="autocomplete-empty" [innerHTML]="notFound"></div>
      </ng-template>

      <p class="helper-text">Permite la ubicación en el navegador para usar esta función.</p>
    </div>

    <div class="location-card__footer">
      <button class="btn btn-primary w-100" (click)="saveLocation()">Guardar ubicación</button>
    </div>
  </div>

  <app-footer-two></app-footer-two>
</div>
