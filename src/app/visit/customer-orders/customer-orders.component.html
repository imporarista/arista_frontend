<div class="orders-container">
  <div class="orders-page">
    <div class="orders-card">
      <div class="orders-card__header">
        <div>
          <img src="assets/images/icon/arrow_back.png" alt="volver" class="header-icon" (click)="goBack()">
        </div>
        <div>
          <h2>Pedidos cliente</h2>
          <p>Elige a quién atender y encuentra sus órdenes en segundos.</p>
        </div>
      </div>

      <div class="orders-card__body">
        <label class="field-label">Cliente</label>
        <div class="autocomplete-input">
          <ng-autocomplete [data]="customers.customerList" [searchKeyword]="customers.keyword"
            placeholder="Nombre del cliente" (selected)='customers.setCustomerSelected($event)'
            (inputFocused)='onFocused($event)' [itemTemplate]="itemTemplate"
            [notFoundTemplate]="notFoundTemplate">
          </ng-autocomplete>
        </div>

        <ng-template #itemTemplate let-item>
          <div class="autocomplete-suggestion" [innerHTML]="item.label"></div>
        </ng-template>

        <ng-template #notFoundTemplate let-notFound>
          <div class="autocomplete-empty" [innerHTML]="notFound"></div>
        </ng-template>
      </div>

      <div class="orders-card__footer">
        <button class="btn btn-primary w-100" (click)="searchOrders()">Buscar órdenes</button>
      </div>
    </div>
  </div>

  <app-footer-two></app-footer-two>
</div>
